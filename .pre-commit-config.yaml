repos:
  - repo: local
    hooks:
      - id: kingfisher
        name: kingfisher
        description: Runs kingfisher hook to scan staged changes for exposed secrets
        entry: ./scripts/pre-commit/kingfisher-precommit.sh
        language: script
        always_run: true

      - id: sync-agent-skills
        name: Sync agent skill mirrors
        description: Ensures CLAUDE.md mirrors AGENTS.md, .claude/skills and .cursor/skills symlink to .agents/skills, and skills copy to .augment/rules/
        language: system
        stages: [ pre-commit ]
        entry: ./scripts/sync-agent-skills.sh
        always_run: false
        files: (^|/)AGENTS\.md$|^\.agents/skills/[^/]+/SKILL\.md$
        pass_filenames: false
